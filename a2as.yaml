manifest:
  version: "0.1.2"
  schema: https://a2as.org/cert/schema
  subject:
    name: shreyashag/chat-bridger-backend
    source: https://github.com/shreyashag/chat-bridger-backend
    branch: master
    commit: "16d98785"
    scope: [src/api/auth/dependencies.py, src/api/models/responses.py, src/api/routers/agents.py, src/api/routers/chat.py,
      src/api/routers/tools.py, src/config.py, src/core/agent_factory.py, src/core/agent_key.py, src/core/agent_loop.py, src/core/event_handlers.py,
      src/core/mcp_manager.py, src/core/model_factory.py, src/logging_config.py, src/tooling/mcp_servers.py, src/tooling/tools.py]
  issued:
    by: A2AS.org
    at: '2026-01-26T16:16:19Z'
  signatures:
    digest: sha256:bXp6tF7ZcSP1LgyUPsCKm8O2N7FSbLjxPzD9Tb0IkzM
    key: ed25519:VmWyzEPA5LKF3879sOMh8a2R_H9JiKgOzNpeYtbEHBI
    sig: ed25519:csRGFF16qiEmURa3hNfztBrw6NSMG5xm82GH9qirO3RDS3NTyXXf14aFDccxd2mYJ3mQcl50-D1T0II2-DkaBg

agents:
  agent:
    type: instance
    models: [model]
    mcp: [mcp_servers]
    params:
      function: _create_triage_agent
      name: Triage Agent
      model_settings: ModelSettings(temperature=0.8, top_p=0.95, frequency_penalty=0.1, presence_penalty=0.1)
      instructions: [You are a helpful assistant., READ ALL THE RULES FIRST AND FOLLOW THEM CAREFULLY., 'RULES:', '1. Use
          available tools when needed, and be informative and assist the user with the queries.', '2. If you use tools, first
          tell the user you will be using a tool.', '3. Then, use the tool.', '4. After that, summarise the tool output and
          use it to answer the user''s query.']
  agent._create_chat_title_renamer:
    type: factory
    models: [model]
    params:
      function: _create_chat_title_renamer
      name: Chat title renamer
      model_settings: ModelSettings(temperature=0.3, max_tokens=3000)
      instructions: [You are an expert at providing meaningful titles for the given chat]
  agent._create_history_tutor:
    type: factory
    models: [model]
    tools: [tools]
    params:
      function: _create_history_tutor
      name: History Tutor
      handoff_description: Specialist agent for history questions
      model_settings: ModelSettings(temperature=0.3, max_tokens=3000)
      instructions: [You provide help with history problems. Explain your reasoning at each step and include examples]
  agent._create_math_tutor:
    type: factory
    models: [model]
    tools: [tools]
    params:
      function: _create_math_tutor
      name: Math Tutor
      handoff_description: Specialist agent for math questions
      model_settings: ModelSettings(temperature=0.3, max_tokens=3000)
      instructions: [You provide help with math problems. Explain your reasoning at each step and include examples]

models:
  model:
    type: variable
    agents: [agent._create_chat_title_renamer, agent._create_history_tutor, agent._create_math_tutor, agent]

tools:
  calculator:
    type: decorator
    params:
      description: Can do calculations!
  currency_converter:
    type: decorator
    params:
      description: |-
        Convert currency amounts using exchange rates.
        :param amount: The amount to convert
        :param from_currency: The source currency code (e.g., 'USD', 'EUR', 'GBP')
        :param to_currency: The target currency code
  date_calculator:
    type: decorator
    params:
      description: |-
        Add or subtract days from a date.
        :param date: The starting date in YYYY-MM-DD format
        :param operation: Either 'add' or 'subtract'
        :param days: Number of days to add or subtract
  date_difference:
    type: decorator
    params:
      description: |-
        Calculate the difference between two dates.
        :param start_date: The starting date in YYYY-MM-DD format
        :param end_date: The ending date in YYYY-MM-DD format
  get_current_time:
    type: decorator
    params:
      description: |-
        Get the current time in a specific timezone.
        :param timezone: The timezone name (e.g., 'America/New_York', 'Europe/London', 'Asia/Tokyo')
  get_latitude_and_longitude:
    type: decorator
    params:
      description: |-
        Get the latitude and longitude coordinates for a given place name.
        :param place: The name of the place or address to geocode.
  get_stock_info_yfinance:
    type: decorator
    params:
      description: |-
        Get detailed stock information using Yahoo Finance.
        :param symbol: The stock symbol (e.g., 'AAPL', 'GOOGL', 'MSFT')
        :param info_type: Type of info to retrieve - 'summary', 'price', 'financials', 'holders', 'news'
  get_stock_price:
    type: decorator
    params:
      description: |-
        Get current stock price for a given symbol.
        :param symbol: The stock symbol (e.g., 'AAPL', 'GOOGL', 'MSFT')
  get_weather:
    type: decorator
    params:
      description: |-
        Get the weather for a given city.
        :param lat: The latitude of the city.
        :param long: The longitude of the city.
  tools:
    type: variable
    agents: [agent._create_history_tutor, agent._create_math_tutor]
    params:
      dynamic: "True"
  unit_converter:
    type: decorator
    params:
      description: |-
        Convert between different units of measurement.
        :param value: The numeric value to convert
        :param from_unit: The unit to convert from (e.g., 'meters', 'feet', 'kg', 'pounds', 'celsius', 'fahrenheit')
        :param to_unit: The unit to convert to

mcp:
  mcp_servers:
    type: process
    agents: [agent]
    params:
      dynamic: "True"
  server.0:
    type: network
    url: weather_server_url
    params:
      class: MCPServerSse
      cache_tools_list: "True"
      name: weather_us
      client_session_timeout_seconds: "30"
      instance: server
  server.1:
    type: network
    url: time_server_url
    params:
      class: MCPServerSse
      cache_tools_list: "True"
      name: time
      client_session_timeout_seconds: "30"
      instance: server
      function: _create_time
  server.2:
    type: network
    url: https://mcp.context7.com/mcp
    params:
      class: MCPServerStreamableHttp
      cache_tools_list: "False"
      name: context7
      instance: server
      function: _create_context7
  server.3:
    type: process
    params:
      class: MCPServerStdio
      cache_tools_list: "True"
      name: perplexity-ask
      instance: server
      function: _create_perplexity_ask

